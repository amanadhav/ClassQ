services:
  postgres:
    image: postgres:16-alpine
    container_name: classq-postgres
    environment:
      POSTGRES_USER: classq
      POSTGRES_PASSWORD: classq
      POSTGRES_DB: classq
    ports:
      - "5432:5432"
    volumes:
      - classq-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U classq -d classq"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: classq-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - classq-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  classq-pgdata:
  classq-redisdata:
